        nameMap.forEach((v, k) => {
          result[k] = v;
        });
        parent.postMessage({ pluginMessage: { type: "aiAnalyzeBatchResult", id: msg.id || null, result } }, "*");
      } catch (e) {
        parent.postMessage({ pluginMessage: { type: "aiAnalyzeBatchResult", id: msg.id || null, result: {} } }, "*");
      }
    }
  };
  parent.postMessage({ pluginMessage: { type: "resize", width: 320, height: 560 } }, "*");
  render();
})();
</script>
</body>
